description = "Audit ForgeKit process compliance across memory, session, QA, review, and handoff gates."

prompt = """
Audit the ForgeKit workflow state for this project.

User request:
{{args}}

Use MCP tool `forgekit_check_workflow` when available with report writing if the user asks for a report. If MCP is unavailable, inspect project memory, active sessions, reports, and memory index directly.

Audit:
- memory initialization
- active session state
- current workflow phase
- unresolved blockers
- verification/test evidence
- QA deferrals
- code review evidence
- security review evidence when sensitive work exists
- memory index presence and staleness
- whether the final status is honest

Rules:
1. Do not call work "complete" if QA is deferred or blocking gates remain.
2. Distinguish implementation-complete from release-ready.
3. Recommend the next command, not vague advice.
4. Do not perform implementation work.

Final response must include:
- decision: pass, pass-with-risk, or block
- missing gates
- deferred gates
- recommended next command
"""
