<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ForgeKit workflow</title>
  <desc id="desc">A workflow diagram showing how the developer, main agent, specialist agents, MCP tools, project memory, quality gates, and GitHub flow work together.</desc>
  <rect width="1200" height="720" rx="24" fill="#FFFFFF"/>
  <text x="72" y="78" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="800" fill="#202124">ForgeKit Workflow</text>
  <text x="72" y="114" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="500" fill="#5F6368">The main agent coordinates specialists, memory, tools, verification, and delivery.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#202124"/>
    </marker>
  </defs>

  <g transform="translate(72 164)">
    <rect width="190" height="92" rx="10" fill="#E9F7F3" stroke="#00A887" stroke-width="2"/>
    <text x="95" y="40" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#202124">Developer</text>
    <text x="95" y="66" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#5F6368">asks for work</text>
  </g>

  <line x1="262" y1="210" x2="356" y2="210" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(372 144)">
    <rect width="234" height="132" rx="10" fill="#F2F4F7" stroke="#5F6368" stroke-width="2"/>
    <text x="117" y="38" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800" fill="#202124">Main Agent</text>
    <text x="117" y="66" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">reads memory</text>
    <text x="117" y="90" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">plans the task</text>
    <text x="117" y="114" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">delegates specialists</text>
  </g>

  <line x1="606" y1="210" x2="702" y2="210" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(718 132)">
    <rect width="410" height="156" rx="10" fill="#FFFFFF" stroke="#202124" stroke-width="2"/>
    <text x="205" y="38" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800" fill="#202124">Specialist Team</text>
    <g transform="translate(30 62)">
      <rect width="100" height="34" rx="8" fill="#E9F7F3" stroke="#00A887"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">Frontend</text>
    </g>
    <g transform="translate(154 62)">
      <rect width="100" height="34" rx="8" fill="#FFF4D8" stroke="#D9A000"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">Backend</text>
    </g>
    <g transform="translate(278 62)">
      <rect width="100" height="34" rx="8" fill="#E8F0FE" stroke="#4C7BE8"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">Database</text>
    </g>
    <g transform="translate(30 106)">
      <rect width="100" height="34" rx="8" fill="#FDECEE" stroke="#D64550"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">Security</text>
    </g>
    <g transform="translate(154 106)">
      <rect width="100" height="34" rx="8" fill="#F2F4F7" stroke="#5F6368"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">QA</text>
    </g>
    <g transform="translate(278 106)">
      <rect width="100" height="34" rx="8" fill="#F2F4F7" stroke="#5F6368"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">Review</text>
    </g>
  </g>

  <line x1="489" y1="276" x2="489" y2="360" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="923" y1="288" x2="923" y2="360" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(250 378)">
    <rect width="478" height="154" rx="10" fill="#FFF4D8" stroke="#D9A000" stroke-width="2"/>
    <text x="239" y="38" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800" fill="#202124">Project Memory</text>
    <text x="239" y="68" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">hot context, sessions, plans, reports, notes, archive</text>
    <text x="239" y="96" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">local index: LanceDB when available, JSONL fallback always</text>
    <rect x="150" y="116" width="178" height="28" rx="8" fill="#202124"/>
    <text x="239" y="135" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF">/team:dashboard</text>
  </g>

  <g transform="translate(778 378)">
    <rect width="350" height="154" rx="10" fill="#FDECEE" stroke="#D64550" stroke-width="2"/>
    <text x="175" y="38" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800" fill="#202124">Quality Gate</text>
    <text x="175" y="70" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">tests, security review, code review</text>
    <text x="175" y="98" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5F6368">memory closeout before final response</text>
    <rect x="88" y="116" width="174" height="28" rx="8" fill="#202124"/>
    <text x="175" y="135" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF">/team:quality-gate</text>
  </g>

  <line x1="489" y1="532" x2="489" y2="592" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="953" y1="532" x2="953" y2="592" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(358 604)">
    <rect width="262" height="58" rx="10" fill="#E9F7F3" stroke="#00A887" stroke-width="2"/>
    <text x="131" y="36" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800" fill="#202124">Updated Project State</text>
  </g>

  <g transform="translate(824 604)">
    <rect width="258" height="58" rx="10" fill="#E8F0FE" stroke="#4C7BE8" stroke-width="2"/>
    <text x="129" y="36" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800" fill="#202124">GitHub Ready Output</text>
  </g>
</svg>
