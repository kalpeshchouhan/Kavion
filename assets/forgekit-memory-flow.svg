<svg width="1280" height="940" viewBox="0 0 1280 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ForgeKit 2 memory flow</title>
  <desc id="desc">Diagram explaining how ForgeKit 2 initializes project memory, keeps hot memory small, stores plans and reports, indexes memory locally with BM25, and migrates old project layouts.</desc>

  <rect width="1280" height="940" fill="#F7F9FB"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#202124"/>
    </marker>
  </defs>

  <g transform="translate(72 54)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="850" fill="#202124">ForgeKit 2 Memory System</text>
    <text x="0" y="58" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600" fill="#5F6368">Files stay local. Hot memory stays small. BM25 index is rebuildable. Old projects can migrate forward.</text>
  </g>

  <g transform="translate(72 142)">
    <rect width="1136" height="724" rx="8" fill="#FFFFFF" stroke="#202124" stroke-width="2"/>
    <rect width="1136" height="64" rx="8" fill="#202124"/>
    <text x="32" y="41" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#FFFFFF">Local project folder: .gemini/forgekit/</text>
    <text x="1100" y="41" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="750" fill="#FFFFFF">No hosted memory server</text>

    <g transform="translate(36 110)">
      <rect width="210" height="94" rx="8" fill="#E8F5F1" stroke="#00A887" stroke-width="2"/>
      <text x="105" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">/team:init-project</text>
      <text x="105" y="60" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">or /forge:init-project</text>
    </g>

    <path d="M258 157H330" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(348 88)">
      <rect width="350" height="138" rx="8" fill="#FFF6DE" stroke="#D9A000" stroke-width="2"/>
      <text x="175" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Hot Memory + Repo Memory</text>
      <text x="175" y="64" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">CURRENT.md</text>
      <text x="175" y="86" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">session.json</text>
      <text x="175" y="108" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">PROJECT.md and DECISIONS.md only when relevant</text>
    </g>

    <path d="M712 157H784" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(802 88)">
      <rect width="298" height="138" rx="8" fill="#EEF3FE" stroke="#4C7BE8" stroke-width="2"/>
      <text x="149" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Search Cache</text>
      <text x="149" y="64" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">index/chunks.jsonl</text>
      <text x="149" y="86" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">index/bm25.json</text>
      <text x="149" y="108" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#202124">local BM25, rebuildable</text>
    </g>

    <path d="M520 226V294" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M950 226V294" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(78 314)">
      <rect width="236" height="136" rx="8" fill="#FAFAFA" stroke="#202124" stroke-width="2"/>
      <text x="118" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">Before Work</text>
      <text x="118" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">read CURRENT.md first</text>
      <text x="118" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">search memory chunks</text>
      <text x="118" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">avoid loading everything</text>
    </g>

    <g transform="translate(358 314)">
      <rect width="236" height="136" rx="8" fill="#FDECEE" stroke="#D64550" stroke-width="2"/>
      <text x="118" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">During Work</text>
      <text x="118" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">update session.json</text>
      <text x="118" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">write plans and reports</text>
      <text x="118" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">notes only if reusable</text>
    </g>

    <g transform="translate(638 314)">
      <rect width="236" height="136" rx="8" fill="#E8F5F1" stroke="#00A887" stroke-width="2"/>
      <text x="118" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">After Work</text>
      <text x="118" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">refresh CURRENT.md</text>
      <text x="118" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">rebuild index if dirty</text>
      <text x="118" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">gate decides done / not-ready</text>
    </g>

    <g transform="translate(918 314)">
      <rect width="180" height="136" rx="8" fill="#EAF2FF" stroke="#4C7BE8" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">History</text>
      <text x="90" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">history.jsonl</text>
      <text x="90" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">completed sessions</text>
    </g>

    <path d="M314 382H346" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M594 382H626" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M874 382H906" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(78 504)">
      <rect width="236" height="112" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="118" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/forge:search</text>
      <text x="118" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">search relevant chunks</text>
      <text x="118" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">read full files only if needed</text>
    </g>

    <g transform="translate(358 504)">
      <rect width="236" height="112" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="118" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/forge:gate</text>
      <text x="118" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">plan, test, review, security, ship</text>
      <text x="118" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">real command and git evidence</text>
    </g>

    <g transform="translate(638 504)">
      <rect width="236" height="112" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="118" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/team:memory-compact</text>
      <text x="118" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">expire notes and flag oversized files</text>
      <text x="118" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">keep hot memory bounded</text>
    </g>

    <g transform="translate(918 504)">
      <rect width="180" height="112" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="90" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/forge:migrate</text>
      <text x="90" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">old layout</text>
      <text x="90" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">to ForgeKit 2</text>
    </g>

    <path d="M520 616V680" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(238 696)">
      <rect width="660" height="92" rx="8" fill="#202124"/>
      <text x="330" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#FFFFFF">Result</text>
      <text x="330" y="56" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#FFFFFF">smaller startup context, local searchable memory, less wasted model work, and a clearer done / not-ready signal</text>
    </g>
  </g>
</svg>
